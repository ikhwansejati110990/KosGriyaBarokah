<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kos Griya Barokah</title>
  
  <style>
    /* Menghilangkan sisa margin dan mencegah scroll ganda pada browser */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }

    /* Membuat iframe memenuhi layar secara presisi di Android & iOS */
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;  /* Fallback untuk browser lama */
      height: 100dvh; /* Mengikuti tinggi dinamis layar HP (mengatasi bug address bar Safari/Chrome mobile) */
      border: none;
    }
  </style>
</head>
<body>

  <iframe
    src="https://script.google.com/macros/s/AKfycbxRfZopY-dQDd7AOd0ao3uZpSJKmgwxc3PZVzfUNGUEdFSvEeeAAjb9DWvg5l8mFijKJw/exec"
    allowfullscreen="true">
  </iframe>

</body>
</html>
